name: Pester Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pester:
    name: Pester
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          Install-Module -Name Pester -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run Pester tests
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $coverageScripts = @(Get-ChildItem -Path ./powershell-migration -Filter *.ps1 -File).FullName
          $pesterParams = @{
              Path     = './tests', './scripts/tests'
              CI       = $true
              PassThru = $true
          }
          if ($coverageScripts.Count -gt 0) {
              $pesterParams['CodeCoverage'] = $coverageScripts
              $pesterParams['CodeCoverageOutputFile'] = 'coverage.xml'
              $pesterParams['CodeCoverageOutputFileEncoding'] = 'UTF8'
          }
          $result = Invoke-Pester @pesterParams
          if ($result.FailedCount -gt 0) {
            throw "Pester reported $($result.FailedCount) failed test(s)."
          }

      - name: Upload code coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-coverage
          path: coverage.xml
          if-no-files-found: ignore
